<input #name type="text" placeholder="Your Name"><br>

<input #email type="email" placeholder="user@example.com"><br>

<input #password type="password" placeholder="Password"><br>

<input #confirmPassword type="password" placeholder="Confirm Password"><br>

<button (click)="register(name.value, email.value, password.value, confirmPassword.value)">
  Register
</button>

<p>
  Already have an account?
  <a routerLink="/login">Login here</a>
</p>
